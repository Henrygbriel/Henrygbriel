<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="corpo">
    <main>
        <h1>Formulário 🔥</h1>
        <form id="form">
        
        <div class="texto">
            <input type="text" placeholder="Digite seu nome" class="required" oninput="nameValidation()">
            <span class="span-required">Nome deve ter no minimo 3 caracteres</span>
            <input type="text" placeholder="Digite seu melhor e-mail" class="required" oninput="emailValidation()">
            <span class="span-required">Digite um email válido</span>
            <input type="password" placeholder="Senha" class="required" oninput="senhaValidation()">
            <span class="span-required">Digite uma senha com no minimo 8 caracteres</span>
            <input type="password" placeholder="Repita sua senha" class="required" oninput="senhaComparacao()">
            <span class="span-required">As senhas devem ser compativeis</span>
            <input type="text" id="fale" placeholder="Fale um pouco sobre voce...(Opcional)">
        </div>

        <label for="">Sexo:</label>

        <div class="sexoClass">
            <div>
                <input type="radio" name="sexo" id="masculino" oninput="sexoValidation()">
                <label for="masculino">Masculino</label>
            </div>
            <div>
                <input type="radio" name="sexo" id="feminino" oninput="sexoValidation()">
                <label for="feminino">Feminino</label>
            </div>
            <div>
                <input type="radio" name="sexo" id="outro" oninput="sexoValidation()">
                <label for="outro">Outro</label>
            </div>

        
        </div>
        <span class="span-required">Selecione o sexo</span>

        <label for="">Quais suas experiencias? (Opcional)</label>

        <div class="experiencias"> 
            <div>
                <input type="checkbox" name="exp">
                <label for="experiencia">HTML</label>
            </div>
            <div>
                <input type="checkbox" name="exp">
                <label for="experiencia">CSS</label>
            </div>

            <div>
                <input type="checkbox" name="exp">
                <label for="experiencia">JavaScript</label>
            </div>
            <div>
                <input type="checkbox" name="exp">
                <label for="experiencia">PHP</label>
            </div>
            
        </div>
        <button type="submit" id="botao-envio">ENVIAR</button>

    </form>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
